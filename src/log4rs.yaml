refresh_rate: 30 seconds

appenders:
  stdout:
    kind: console
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S)} {l:5} [ {T} -> {M} ]: {m}{n}"

  logfile:
    kind: file
    path: "logs/AdGuardLib.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S)} {l:5} [ {T} -> {M} ]: {m}{n}"

root:
  level: info
  appenders:
    - stdout
    - logfile